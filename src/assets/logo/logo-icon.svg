<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" width="48" height="48">
  <defs>
    <linearGradient id="grad-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
  </defs>
  <!-- Document body -->
  <rect x="8" y="6" width="22" height="28" rx="3" ry="3" stroke="url(#grad-icon)" stroke-width="2" fill="none"/>
  <!-- Document fold corner -->
  <path d="M24 6 L30 12 L24 12 Z" stroke="url(#grad-icon)" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Document lines -->
  <line x1="13" y1="18" x2="25" y2="18" stroke="url(#grad-icon)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="22" x2="25" y2="22" stroke="url(#grad-icon)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="26" x2="21" y2="26" stroke="url(#grad-icon)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Magnifying glass circle -->
  <circle cx="31" cy="31" r="9" stroke="url(#grad-icon)" stroke-width="2.2" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="37.5" y1="37.5" x2="43" y2="43" stroke="url(#grad-icon)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner lens highlight -->
  <circle cx="28.5" cy="28.5" r="2.5" fill="url(#grad-icon)" opacity="0.25"/>
</svg>

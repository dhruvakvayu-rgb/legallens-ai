<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" width="200" height="48">
  <defs>
    <linearGradient id="grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="text-grad-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
  </defs>

  <!-- Document body -->
  <rect x="4" y="4" width="22" height="28" rx="3" ry="3" stroke="url(#grad-dark)" stroke-width="2" fill="none"/>
  <!-- Document fold corner -->
  <path d="M20 4 L26 10 L20 10 Z" stroke="url(#grad-dark)" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Document lines -->
  <line x1="9" y1="16" x2="21" y2="16" stroke="url(#grad-dark)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="20" x2="21" y2="20" stroke="url(#grad-dark)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="24" x2="17" y2="24" stroke="url(#grad-dark)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Magnifying glass circle -->
  <circle cx="27" cy="29" r="9" stroke="url(#grad-dark)" stroke-width="2.2" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="33.5" y1="35.5" x2="39" y2="41" stroke="url(#grad-dark)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner lens highlight -->
  <circle cx="24.5" cy="26.5" r="2.5" fill="url(#grad-dark)" opacity="0.25"/>

  <!-- Text: LegalLens AI -->
  <text x="50" y="22" font-family="Inter, Poppins, system-ui, sans-serif" font-size="15" font-weight="700" fill="url(#text-grad-dark)" letter-spacing="-0.3">LegalLens AI</text>
  <text x="50" y="36" font-family="Inter, Poppins, system-ui, sans-serif" font-size="9" font-weight="400" fill="#9CA3AF" letter-spacing="0.5">Understand. Evaluate. Decide.</text>
</svg>
